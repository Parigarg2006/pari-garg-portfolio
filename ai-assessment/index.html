<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ConfidenceAI — Skill Assessment Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#08081a;--bg2:#0f0f28;--bg3:#161636;--bg4:#1d1d42;--p:#7c6ef5;--p2:#5b4de0;--p3:#a89df7;--c:#22d3ee;--pk:#f472b6;--go:#fbbf24;--gr:#34d399;--re:#f87171;--tx:#f1f0ff;--mt:#8b8ab8;--dim:#5c5b8a;--card:rgba(255,255,255,.04);--card2:rgba(255,255,255,.07);--br:rgba(124,110,245,.18);--br2:rgba(34,211,238,.13);}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;}
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
.app{position:relative;z-index:1;}
.scr{display:none;}.scr.on{display:block;}

/* NAV */
.nav{display:flex;align-items:center;gap:.8rem;padding:.85rem 2rem;border-bottom:1px solid var(--br);background:rgba(8,8,26,.82);backdrop-filter:blur(22px);position:sticky;top:0;z-index:100;}
.n-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;background:linear-gradient(120deg,var(--c),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.n-tabs{display:flex;gap:.25rem;margin-left:.5rem;}
.nt{padding:.3rem .75rem;border-radius:8px;font-size:.74rem;font-weight:600;cursor:pointer;border:1px solid transparent;color:var(--mt);transition:all .2s;background:none;font-family:'Outfit',sans-serif;}
.nt:hover{color:var(--tx);background:var(--card);}
.nt.on{color:var(--p3);border-color:var(--br);background:rgba(124,110,245,.1);}
.n-right{margin-left:auto;display:flex;align-items:center;gap:.7rem;}
.n-badge{display:flex;align-items:center;gap:.35rem;border-radius:999px;padding:.27rem .75rem;font-size:.74rem;font-weight:700;}
.xp-b{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.22);color:var(--go);}
.str-b{background:rgba(244,114,182,.1);border:1px solid rgba(244,114,182,.2);color:var(--pk);}
.lv-b{font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:700;padding:.25rem .7rem;border-radius:8px;background:linear-gradient(135deg,var(--p2),var(--p));color:#fff;}

/* DASHBOARD */
.dash{max-width:1080px;margin:0 auto;padding:2rem;}
.dash-header{margin-bottom:2rem;}
.dash-header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.7rem,3.5vw,2.4rem);font-weight:700;line-height:1.1;margin-bottom:.4rem;}
.dash-header h1 em{font-style:normal;background:linear-gradient(120deg,var(--c),var(--p),var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.dash-header p{color:var(--mt);font-size:.95rem;}
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem;margin-bottom:1.6rem;}
.stat-c{background:var(--card);border:1px solid var(--br);border-radius:14px;padding:1.2rem;transition:all .22s;}
.stat-c:hover{background:var(--card2);border-color:rgba(124,110,245,.32);transform:translateY(-2px);}
.stat-ico{font-size:1.5rem;margin-bottom:.6rem;}
.stat-v{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:700;background:linear-gradient(120deg,var(--c),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;}
.stat-l{font-size:.7rem;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;margin-top:.15rem;}

/* SKILL BARS */
.skill-sec{background:var(--card);border:1px solid var(--br);border-radius:18px;padding:1.6rem;margin-bottom:1.4rem;}
.sec-title{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:1.2rem;display:flex;align-items:center;gap:.4rem;}
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;}
.sk-row{display:flex;flex-direction:column;gap:.28rem;}
.sk-label{display:flex;justify-content:space-between;font-size:.8rem;}
.sk-name{color:var(--tx);font-weight:500;}
.sk-pct{color:var(--mt);}
.sk-track{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.sk-fill{height:100%;border-radius:3px;transition:width 1.3s cubic-bezier(.25,.8,.25,1);}

/* CHALLENGES */
.chal-sec{background:linear-gradient(135deg,rgba(124,110,245,.07),rgba(34,211,238,.04));border:1px solid var(--br);border-radius:18px;padding:1.6rem;margin-bottom:1.4rem;}
.chal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;}
.ch-timer{font-size:.74rem;color:var(--pk);background:rgba(244,114,182,.1);border:1px solid rgba(244,114,182,.2);padding:.2rem .6rem;border-radius:6px;font-weight:600;}
.chal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.7rem;}
.ch-c{background:var(--card2);border:1px solid var(--br);border-radius:12px;padding:.9rem 1rem;cursor:pointer;transition:all .22s;}
.ch-c:hover{border-color:var(--p);background:rgba(124,110,245,.08);transform:translateY(-2px);}
.ch-c.done{border-color:var(--gr);background:rgba(52,211,153,.05);opacity:.65;pointer-events:none;}
.ch-ico{font-size:1.3rem;margin-bottom:.35rem;}
.ch-name{font-size:.8rem;font-weight:700;margin-bottom:.18rem;}
.ch-rwd{font-size:.7rem;color:var(--go);display:flex;align-items:center;gap:.22rem;}

/* MODES */
.modes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.9rem;margin-bottom:1.4rem;}
.mode-c{background:var(--card);border:1px solid var(--br);border-radius:16px;padding:1.3rem;cursor:pointer;transition:all .28s;position:relative;overflow:hidden;}
.mode-c::before{content:'';position:absolute;inset:0;background:var(--mc-g,linear-gradient(135deg,var(--p),var(--c)));opacity:0;transition:opacity .28s;}
.mode-c:hover{transform:translateY(-4px);box-shadow:0 14px 36px rgba(0,0,0,.24);border-color:rgba(124,110,245,.38);}
.mode-c:hover::before{opacity:.07;}
.mc-i{font-size:2rem;margin-bottom:.8rem;display:block;position:relative;z-index:1;}
.mc-t{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:.28rem;position:relative;z-index:1;}
.mc-d{font-size:.76rem;color:var(--mt);line-height:1.55;margin-bottom:.7rem;position:relative;z-index:1;}
.mc-tags{display:flex;gap:.35rem;flex-wrap:wrap;position:relative;z-index:1;}
.mc-tag{font-size:.62rem;padding:.15rem .5rem;border-radius:5px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:var(--mt);}
.mc-diff{position:absolute;top:.85rem;right:.85rem;font-size:.62rem;font-weight:700;padding:.18rem .52rem;border-radius:5px;}
.d-easy{background:rgba(52,211,153,.14);color:var(--gr);border:1px solid rgba(52,211,153,.22);}
.d-med{background:rgba(251,191,36,.11);color:var(--go);border:1px solid rgba(251,191,36,.2);}
.d-hard{background:rgba(248,113,113,.11);color:var(--re);border:1px solid rgba(248,113,113,.2);}

/* ASSESS */
.assess-wrap{max-width:740px;margin:0 auto;padding:2rem;}
.ass-head{display:flex;align-items:center;gap:.8rem;margin-bottom:1.4rem;}
.prog-wrap{flex:1;display:flex;align-items:center;gap:.7rem;}
.prog-track{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--c),var(--p));border-radius:2px;transition:width .4s ease;}
.timer-chip{display:flex;align-items:center;gap:.3rem;background:var(--card2);border:1px solid var(--br2);border-radius:999px;padding:.28rem .75rem;font-size:.78rem;font-weight:700;color:var(--c);font-family:'Space Grotesk',sans-serif;min-width:70px;justify-content:center;}
.q-card{background:var(--card);border:1px solid var(--br);border-radius:18px;padding:1.8rem;margin-bottom:1.1rem;animation:slideIn .28s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.q-tag{font-size:.63rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--p3);margin-bottom:.75rem;display:flex;align-items:center;gap:.38rem;}
.q-tag::before{content:'';width:16px;height:1px;background:var(--p);}
.q-text{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:600;line-height:1.5;margin-bottom:1.4rem;}
.q-hint{background:rgba(124,110,245,.07);border:1px solid var(--br);border-radius:10px;padding:.65rem .9rem;font-size:.78rem;color:var(--mt);line-height:1.6;margin-bottom:1.1rem;display:flex;gap:.45rem;align-items:flex-start;}
/* MCQ */
.opts{display:flex;flex-direction:column;gap:.55rem;}
.opt{padding:.85rem 1rem;border:1.5px solid var(--br);border-radius:11px;cursor:pointer;transition:all .18s;font-size:.88rem;text-align:left;background:transparent;color:var(--tx);font-family:'Outfit',sans-serif;display:flex;align-items:center;gap:.75rem;width:100%;}
.opt:hover{border-color:var(--p);background:rgba(124,110,245,.06);}
.opt.correct{border-color:var(--gr)!important;background:rgba(52,211,153,.1)!important;color:var(--gr);}
.opt.wrong{border-color:var(--re)!important;background:rgba(248,113,113,.1)!important;color:var(--re);}
.opt-l{width:24px;height:24px;border-radius:7px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;font-family:'Space Grotesk',sans-serif;}
.opt-exp{font-size:.76rem;margin-top:.6rem;padding:.58rem .85rem;border-radius:8px;display:none;line-height:1.6;}
.opt-exp.show{display:block;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.15);color:var(--gr);}
/* TEXT */
.t-area{width:100%;background:rgba(255,255,255,.03);border:1.5px solid var(--br);border-radius:12px;padding:.9rem;color:var(--tx);font-family:'Outfit',sans-serif;font-size:.88rem;line-height:1.7;resize:vertical;min-height:105px;outline:none;transition:border .2s;}
.t-area:focus{border-color:var(--p);}
.t-meta{display:flex;justify-content:space-between;font-size:.72rem;color:var(--mt);margin-top:.38rem;}
.qual-chips{display:flex;gap:.4rem;margin-top:.55rem;flex-wrap:wrap;}
.qchip{font-size:.66rem;padding:.16rem .52rem;border-radius:5px;border:1px solid var(--br);color:var(--mt);transition:all .25s;}
.qchip.on{background:rgba(124,110,245,.14);border-color:var(--p);color:var(--p3);}
/* SPEAK */
.speak-box{background:rgba(34,211,238,.04);border:1.5px solid var(--br2);border-radius:15px;padding:1.3rem;margin-bottom:1.1rem;}
.sp-prompt{font-size:.92rem;line-height:1.75;margin-bottom:1.1rem;}
.sp-timer-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:1rem;}
.sp-ring{width:100px;height:100px;position:relative;}
.sp-ring svg{transform:rotate(-90deg);}
.sp-ring circle{fill:none;stroke-width:5;}
.sp-bg{stroke:rgba(255,255,255,.07);}
.sp-fg{stroke:var(--c);stroke-linecap:round;stroke-dasharray:283;transition:stroke-dashoffset .5s linear;}
.sp-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;}
.rec-row{display:flex;align-items:center;gap:.9rem;flex-wrap:wrap;}
.rec-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;font-size:1.05rem;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.rec-idle{background:rgba(124,110,245,.15);color:var(--p3);border:1.5px solid var(--p);}
.rec-live{background:var(--re);color:#fff;animation:rp 1s ease-in-out infinite;}
@keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}50%{box-shadow:0 0 0 10px rgba(248,113,113,0)}}
.waveform{flex:1;height:30px;background:rgba(255,255,255,.03);border-radius:8px;overflow:hidden;display:flex;align-items:center;gap:2px;padding:0 7px;}
.wv{width:3px;border-radius:2px;background:var(--p);opacity:.3;transition:height .1s,opacity .1s;}
.speak-hint{font-size:.72rem;color:var(--mt);text-align:center;margin-top:.5rem;}
/* BTN */
.btn-row{display:flex;gap:.6rem;justify-content:flex-end;margin-top:.4rem;}
.btn{padding:.58rem 1.3rem;border-radius:9px;font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:.35rem;}
.btn-p{background:linear-gradient(135deg,var(--p2),var(--p));color:#fff;}
.btn-p:hover{opacity:.88;transform:translateY(-1px);}
.btn-o{border:1px solid var(--br);background:transparent;color:var(--mt);}
.btn-o:hover{border-color:var(--p);color:var(--p3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}

/* RESULT */
.res-wrap{max-width:780px;margin:0 auto;padding:2rem;}
.res-hero{text-align:center;padding:1.2rem 0 1.8rem;}
.score-ring{width:150px;height:150px;margin:0 auto 1rem;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.score-ring circle{fill:none;stroke-width:9;}
.sr-bg{stroke:rgba(255,255,255,.06);}
.sr-fill{stroke:url(#rg);stroke-linecap:round;stroke-dasharray:428;transition:stroke-dashoffset 1.8s cubic-bezier(.25,.8,.25,1);}
.score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-val{font-family:'Space Grotesk',sans-serif;font-size:2.4rem;font-weight:700;background:linear-gradient(135deg,var(--c),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.score-lbl{font-size:.68rem;color:var(--mt);letter-spacing:.1em;text-transform:uppercase;}
.res-title{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;margin-bottom:.35rem;}
.res-sub{color:var(--mt);font-size:.88rem;max-width:400px;margin:0 auto 1rem;}
/* METRICS */
.metrics-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.9rem;margin:1.5rem 0;}
.mc{background:var(--card);border:1px solid var(--br);border-radius:13px;padding:1.1rem;transition:all .2s;}
.mc:hover{background:var(--card2);transform:translateY(-2px);}
.mc-l{font-size:.66rem;color:var(--mt);text-transform:uppercase;letter-spacing:.09em;margin-bottom:.38rem;}
.mc-v{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;margin-bottom:.35rem;}
.mc-bar{height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.mcb{height:100%;border-radius:2px;transition:width 1.2s ease;}
/* FEEDBACK TABS */
.fb-tabs{display:flex;gap:.35rem;margin-bottom:1rem;flex-wrap:wrap;}
.fb-tab{padding:.3rem .75rem;border-radius:8px;border:1px solid var(--br);background:transparent;color:var(--mt);font-size:.74rem;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;}
.fb-tab.on{background:rgba(124,110,245,.15);border-color:var(--p);color:var(--p3);}
.fb-box{background:var(--card);border:1px solid var(--br);border-radius:15px;padding:1.4rem;margin-bottom:.9rem;}
.fb-box h4{font-size:.73rem;font-weight:700;letter-spacing:.11em;text-transform:uppercase;margin-bottom:.8rem;}
.fb-item{display:flex;align-items:flex-start;gap:.55rem;font-size:.85rem;color:var(--mt);margin-bottom:.55rem;line-height:1.6;}
.fb-item.good::before{content:'✓';color:var(--gr);flex-shrink:0;margin-top:.1rem;}
.fb-item.imp::before{content:'↑';color:var(--c);flex-shrink:0;margin-top:.1rem;}
.fb-item.tip::before{content:'💡';flex-shrink:0;font-size:.78rem;margin-top:.1rem;}
/* ACHIEVEMENTS */
.achs{display:flex;gap:.55rem;flex-wrap:wrap;justify-content:center;margin:1.2rem 0;}
.ach{display:flex;flex-direction:column;align-items:center;gap:.28rem;background:var(--card2);border:1px solid var(--br);border-radius:11px;padding:.75rem .85rem;min-width:75px;transition:all .2s;}
.ach:hover{border-color:var(--p);}
.ach.new{border-color:var(--go);background:rgba(251,191,36,.07);animation:achPop .4s ease;}
@keyframes achPop{0%{transform:scale(.7);opacity:0}80%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.ach-ico{font-size:1.4rem;}
.ach-name{font-size:.6rem;color:var(--mt);text-align:center;font-weight:600;}
.ach-new{font-size:.52rem;background:var(--go);color:#000;padding:.06rem .32rem;border-radius:4px;font-weight:800;}
.res-btns{display:flex;gap:.7rem;justify-content:center;margin-top:1.8rem;flex-wrap:wrap;}

/* HISTORY */
.hist-wrap{max-width:760px;margin:0 auto;padding:2rem;}
.hist-chart{background:var(--card);border:1px solid var(--br);border-radius:16px;padding:1.3rem;margin-bottom:1.3rem;}
.hc-l{font-size:.72rem;color:var(--mt);text-transform:uppercase;letter-spacing:.09em;margin-bottom:.9rem;}
.hc-bars{display:flex;align-items:flex-end;gap:.3rem;height:70px;margin-bottom:.35rem;}
.hc-bar{flex:1;border-radius:3px 3px 0 0;background:linear-gradient(to top,var(--p2),var(--p3));opacity:.55;transition:opacity .2s;cursor:pointer;min-height:4px;}
.hc-bar:hover{opacity:1;}
.hc-labels{display:flex;gap:.3rem;}
.hc-lbl{flex:1;text-align:center;font-size:.6rem;color:var(--dim);}
.hist-list{display:flex;flex-direction:column;gap:.65rem;}
.hi{display:flex;align-items:center;gap:.9rem;padding:.95rem 1.1rem;background:var(--card);border:1px solid var(--br);border-radius:13px;transition:all .2s;cursor:pointer;}
.hi:hover{background:var(--card2);border-color:rgba(124,110,245,.3);transform:translateX(3px);}
.hi-score{font-family:'Space Grotesk',sans-serif;font-size:1.35rem;font-weight:700;min-width:46px;background:linear-gradient(135deg,var(--c),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hi-info{flex:1;}
.hi-title{font-size:.86rem;font-weight:600;margin-bottom:.13rem;}
.hi-meta{font-size:.72rem;color:var(--mt);}
.hi-bar{width:55px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
.hi-fill{height:100%;background:linear-gradient(90deg,var(--c),var(--p));border-radius:2px;}

/* LEADERBOARD */
.lb-wrap{max-width:680px;margin:0 auto;padding:2rem;}
.lb-filters{display:flex;gap:.4rem;margin-bottom:1.1rem;flex-wrap:wrap;}
.lb-f{padding:.3rem .85rem;border-radius:999px;border:1px solid var(--br);background:transparent;color:var(--mt);font-size:.75rem;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;}
.lb-f.on,.lb-f:hover{background:rgba(124,110,245,.14);border-color:var(--p);color:var(--p3);}
.lb-list{display:flex;flex-direction:column;gap:.55rem;}
.lb-row{display:flex;align-items:center;gap:.9rem;padding:.95rem 1.1rem;background:var(--card);border:1px solid var(--br);border-radius:13px;transition:all .2s;}
.lb-row:hover{background:var(--card2);}
.lb-row.me{border-color:var(--p);background:rgba(124,110,245,.07);}
.lb-rank{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;min-width:30px;text-align:center;}
.lb-rank.g{color:var(--go);}.lb-rank.s{color:#c0c0c0;}.lb-rank.b{color:#cd7f32;}
.lb-av{width:36px;height:36px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:1rem;border:2px solid var(--br);}
.lb-info{flex:1;}
.lb-name{font-size:.87rem;font-weight:600;margin-bottom:.13rem;}
.lb-bdgs{display:flex;gap:.28rem;flex-wrap:wrap;margin-top:.2rem;}
.lb-b{font-size:.65rem;padding:.1rem .42rem;border-radius:4px;background:rgba(124,110,245,.1);border:1px solid var(--br);color:var(--mt);}
.lb-xp{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;color:var(--p3);}

/* XP POP */
.xp-pop{position:fixed;top:5rem;right:1.5rem;background:rgba(251,191,36,.14);border:1px solid rgba(251,191,36,.28);border-radius:11px;padding:.55rem .9rem;font-size:.82rem;font-weight:700;color:var(--go);z-index:999;transform:translateY(-18px);opacity:0;transition:all .35s;pointer-events:none;}
.xp-pop.show{transform:none;opacity:1;}

@media(max-width:768px){.dash-grid{grid-template-columns:1fr 1fr;}.n-tabs{display:none;}.skill-grid{grid-template-columns:1fr;}}
@media(max-width:480px){.dash-grid,.modes-grid{grid-template-columns:1fr;}.chal-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="app">
<div class="xp-pop" id="xpPop"></div>

<!-- NAV -->
<div class="nav">
  <div class="n-logo">🎯 ConfidenceAI</div>
  <div class="n-tabs">
    <button class="nt on" onclick="goTab('dash',this)">Dashboard</button>
    <button class="nt" onclick="goTab('hist',this)">History</button>

  imp:['Add quantifiable data or metrics to strengthen your claims','Vary sentence length — mix short punchy statements with longer elaborations','Work on a stronger, more memorable closing statement','Reduce filler words (um, uh, like, you know) for more impact','Build richer vocabulary for precision in technical contexts'],

  plan:['Week 1: Record yourself daily for 5 min, review for filler words','Week 2: Read one Harvard Business Review article — summarize in 3 bullet points','Week 3: Practice one timed speaking prompt every morning before class','Week 4: Do a mock interview with a friend using the questions from Interview Prep mode','Month 2: Enter at least 2 public speaking events or group discussions'],
};

// ── RENDER DASHBOARD ──────────────────────────────────────
function renderDash(){
  document.getElementById('statsG').innerHTML=[
    {ico:'📊',v:sessions||'0',l:'Sessions Done'},
    {ico:'🏆',v:best||'--',l:'Best Score'},
    {ico:'⭐',v:avg?avg+'%':'--',l:'Avg Score'},
    {ico:'🎯',v:level,l:'Current Level'},
  ].map(s=>`<div class="stat-c"><div class="stat-ico">${s.ico}</div><span class="stat-v">${s.v}</span><div class="stat-l">${s.l}</div></div>`).join('');

  document.getElementById('skillG').innerHTML=skills.map(s=>`<div class="sk-row"><div class="sk-label"><span class="sk-name">${s.n}</span><span class="sk-pct">${s.lv}%</span></div><div class="sk-track"><div class="sk-fill" style="width:${s.lv}%;background:${s.c}"></div></div></div>`).join('');

  document.getElementById('chalG').innerHTML=challenges.map((c,i)=>`<div class="ch-c ${doneCh.has(i)?'done':''}" onclick="doChallenge(${i})"><div class="ch-ico">${c.ico}</div><div class="ch-name">${c.n}</div><div class="ch-rwd">⭐ ${c.rwd}</div>${doneCh.has(i)?'<div style="font-size:.62rem;color:var(--gr);margin-top:.2rem">✓ Completed</div>':''}</div>`).join('');

  document.getElementById('modesG').innerHTML=modes.map(m=>`<div class="mode-c" style="--mc-g:${m.g}" onclick="startSession('${m.id}')"><span class="mc-i">${m.icon}</span><div class="mc-diff ${m.diff==='easy'?'d-easy':m.diff==='med'?'d-med':'d-hard'}">${m.diff}</div><div class="mc-t">${m.title}</div><div class="mc-d">${m.desc}</div><div class="mc-tags">${m.tags.map(t=>`<span class="mc-tag">${t}</span>`).join('')}</div></div>`).join('');
  updateTimer();
}

function updateTimer(){
  const el=document.getElementById('chT');if(!el)return;
  const now=new Date();const mn=new Date(now);mn.setHours(24,0,0,0);
  const d=mn-now;const h=String(Math.floor(d/3.6e6)).padStart(2,'0');const m=String(Math.floor(d%3.6e6/6e4)).padStart(2,'0');const s=String(Math.floor(d%6e4/1e3)).padStart(2,'0');
  el.textContent=`Resets in ${h}:${m}:${s}`;setTimeout(updateTimer,1000);
}

function doChallenge(i){if(doneCh.has(i))return;doneCh.add(i);startSession(challenges[i].mode);}

// ── ASSESSMENT ────────────────────────────────────────────
function startSession(mode){
  curMode=mode;curQ=0;answers=[];
  showScr('assScr');renderQ();
}

function getQs(){return qDB[curMode]||qDB.comm;}

function renderQ(){
  clearInterval(cntDwn);recActive=false;clearInterval(wvInt);
  const qs=getQs();const q=qs[curQ];const total=qs.length;
  document.getElementById('pFill').style.width=((curQ/total)*100)+'%';
  document.getElementById('pLbl').textContent=`${curQ+1}/${total}`;
  const nb=document.getElementById('nBtn');nb.disabled=true;
  let html='';
  if(q.t==='mcq'){
    document.getElementById('tChip').textContent='MCQ';
    html=`<div class="q-card"><div class="q-tag">${q.tag}</div><div class="q-text">${q.q}</div><div class="opts">${q.opts.map((o,i)=>`<button class="opt" id="o${i}" onclick="pickOpt(${i},${q.ans},'${(q.exp||'').replace(/'/g,"\\'")}')"><span class="opt-l">${'ABCD'[i]}</span>${o}</button>`).join('')}</div><div class="opt-exp" id="oExp"></div></div>`;
  } else if(q.t==='speak'){
    document.getElementById('tChip').textContent=q.time+'s';
    html=`<div class="q-card"><div class="q-tag">${q.tag}</div><div class="speak-box"><div class="sp-prompt">${q.prompt}</div><div class="sp-timer-wrap"><div class="sp-ring"><svg viewBox="0 0 100 100" width="100" height="100"><circle class="sp-bg" cx="50" cy="50" r="45"/><circle class="sp-fg" id="spFg" cx="50" cy="50" r="45" style="stroke-dashoffset:0"/></svg><div class="sp-txt" id="spTxt">${q.time}</div></div></div><div class="rec-row"><button class="rec-btn rec-idle" id="rBtn" onclick="toggleRec(${q.time})">🎤</button><div class="waveform" id="wv">${Array(22).fill('<div class="wv" style="height:4px"></div>').join('')}</div><span style="font-size:.74rem;color:var(--mt)" id="rStat">Press 🎤 to begin</span></div></div><div class="speak-hint">Speak clearly · AI analyses tone, pace & vocabulary</div></div>`;
    setTimeout(()=>startCountdown(q.time),100);
  } else {
    document.getElementById('tChip').textContent='Written';
    html=`<div class="q-card"><div class="q-tag">${q.tag}</div><div class="q-text">${q.q}</div>${q.hint?`<div class="q-hint"><span>💡</span>${q.hint}</div>`:''}<textarea class="t-area" id="tArea" placeholder="Write your response here…" oninput="checkTxt()"></textarea><div class="t-meta"><span id="wCnt">0 words</span><span>Target: 60–150 words</span></div><div class="qual-chips"><span class="qchip" id="qc1">📏 Length</span><span class="qchip" id="qc2">🔤 Structure</span><span class="qchip" id="qc3">💡 Clarity</span><span class="qchip" id="qc4">✅ Specific</span></div></div>`;
  }
  document.getElementById('qArea').innerHTML=html;
  document.getElementById('nBtn').onclick=nextQ;
}

function pickOpt(i,correct,exp){
  document.querySelectorAll('.opt').forEach((o,idx)=>{o.classList.remove('correct','wrong');if(idx===correct)o.classList.add('correct');else if(idx===i&&i!==correct)o.classList.add('wrong');o.disabled=true;});
  const ex=document.getElementById('oExp');if(ex&&exp){ex.textContent='💡 '+exp;ex.classList.add('show');}
  answers[curQ]=i===correct?1:0;enableNext();
}

function checkTxt(){
  const v=document.getElementById('tArea')?.value||'';
  const w=v.trim().split(/\s+/).filter(Boolean).length;
  const el=document.getElementById('wCnt');if(el)el.textContent=w+' words';
  document.getElementById('qc1')?.classList.toggle('on',w>=30);
  document.getElementById('qc2')?.classList.toggle('on',v.includes('.')||v.includes(','));
  document.getElementById('qc3')?.classList.toggle('on',w>=60);
  document.getElementById('qc4')?.classList.toggle('on',/\d|example|instance|such as|specifically|because/i.test(v));
  answers[curQ]=Math.min(w/100,1);if(w>=30)enableNext();else document.getElementById('nBtn').disabled=true;
}

function toggleRec(maxT){
  recActive=!recActive;
  const btn=document.getElementById('rBtn');const stat=document.getElementById('rStat');
  if(recActive){btn.className='rec-btn rec-live';btn.textContent='⏹';if(stat)stat.textContent='Recording… speak naturally';wvInt=setInterval(()=>{document.querySelectorAll('.wv').forEach(b=>{b.style.height=(3+Math.random()*24)+'px';b.style.opacity=(.28+Math.random()*.62).toFixed(2);});},115);answers[curQ]=.72+Math.random()*.25;enableNext();}
  else{btn.className='rec-btn rec-idle';btn.textContent='🎤';if(stat)stat.textContent='✅ Recorded — press Next';clearInterval(wvInt);document.querySelectorAll('.wv').forEach(b=>{b.style.height='4px';b.style.opacity='.3';});}
}

function startCountdown(total){
  let t=total;clearInterval(cntDwn);
  cntDwn=setInterval(()=>{t--;
    const el=document.getElementById('spTxt');const fg=document.getElementById('spFg');
    if(el)el.textContent=t;if(fg){const off=283-(283*(total-t)/total);fg.style.strokeDashoffset=off;}
    if(t<=0){clearInterval(cntDwn);if(!recActive&&answers[curQ]===undefined){answers[curQ]=.4;enableNext();}}
  },1000);
}

function enableNext(){document.getElementById('nBtn').disabled=false;}

function nextQ(){
  clearInterval(cntDwn);clearInterval(wvInt);
  if(answers[curQ]===undefined)answers[curQ]=0;
  curQ++;
  if(curQ>=getQs().length)showResults();else renderQ();
}
function skipQ(){answers[curQ]=0;nextQ();}

// ── RESULTS ───────────────────────────────────────────────
function showResults(){
  showScr('resScr');
  const total=getQs().length;
  const raw=answers.reduce((a,b)=>a+(b||0),0)/total;
  const score=Math.min(Math.max(Math.round(36+raw*58+Math.random()*6),28),99);
  sessions++;best=Math.max(best,score);
  const all=history.map(h=>h.score).concat(score);
  avg=Math.round(all.reduce((a,b)=>a+b,0)/all.length);
  history.unshift({mode:curMode,score,date:new Date(),qs:answers.length});
  const earned=Math.round(score*.85+sessions*5);xp+=earned;level=Math.floor(xp/200)+1;
  skills.forEach(s=>{s.lv=Math.min(s.lv+Math.round(raw*14+Math.random()*7),99);});
  updateTopBar();showXPPop('+'+earned+' XP!');

  document.getElementById('sVal').textContent=score;
  const off=428-(428*score/100);setTimeout(()=>{document.getElementById('srFill').style.strokeDashoffset=off;},150);

  const tiers=[{min:88,t:'Outstanding!',s:'Elite performance. You\'re ready for real challenges.'},{min:75,t:'Impressive!',s:'Strong skills. Minor refinements will make you stand out.'},{min:60,t:'Good Work!',s:'Solid foundation. Keep building on this.'},{min:40,t:'Keep Going!',s:'Consistency is key. Review the feedback carefully.'},{min:0,t:'Just Starting',s:'Every expert began here. Show up daily.'}];
  const tier=tiers.find(t=>score>=t.min);
  document.getElementById('rTitle').textContent=tier.t;
  document.getElementById('rSub').textContent=tier.s;

  const achs=[];
  if(sessions===1)achs.push({ico:'🚀',n:'First Session',new:true});
  if(score>=80)achs.push({ico:'🔥',n:'Score 80+',new:score>=80});
  if(sessions>=5)achs.push({ico:'💎',n:'5 Sessions',new:sessions===5});
  achs.push({ico:'⭐',n:'XP Earned',new:false});
  if(raw>=.9)achs.push({ico:'🎯',n:'Near Perfect',new:true});
  document.getElementById('achsEl').innerHTML=achs.map(a=>`<div class="ach ${a.new?'new':''}"><div class="ach-ico">${a.ico}</div><div class="ach-name">${a.n}</div>${a.new?'<div class="ach-new">NEW</div>':''}</div>`).join('');

  const metrics=[{l:'Clarity',v:Math.round(44+raw*52),c:'#22d3ee'},{l:'Confidence',v:Math.round(40+raw*56),c:'#7c6ef5'},{l:'Structure',v:Math.round(42+Math.random()*53),c:'#f472b6'},{l:'Vocabulary',v:Math.round(48+Math.random()*46),c:'#fbbf24'},{l:'Engagement',v:Math.round(40+raw*55),c:'#34d399'},{l:'Overall',v:score,c:'#a89df7'}];
  document.getElementById('metricsEl').innerHTML=metrics.map(m=>`<div class="mc"><div class="mc-l">${m.l}</div><div class="mc-v" style="color:${m.c}">${m.v}<span style="font-size:.68rem;opacity:.5">/100</span></div><div class="mc-bar"><div class="mcb" style="width:${m.v}%;background:${m.c}"></div></div></div>`).join('');

  switchFb('str',document.querySelector('.fb-tab'));
  renderHistChart();
}

function switchFb(type,btn){
  document.querySelectorAll('.fb-tab').forEach(t=>t.classList.remove('on'));btn?.classList.add('on');
  const titles={str:'✓ Strengths',imp:'↑ Areas to Improve',tip:'💡 Pro Tips',plan:'📅 30-Day Action Plan'};
  const classes={str:'good',imp:'imp',tip:'tip',plan:'tip'};
  const data=feedbacks[type]||[];
  document.getElementById('fbEl').innerHTML=`<div class="fb-box"><h4 style="color:${type==='str'?'var(--gr)':type==='imp'?'var(--c)':'var(--go)'}">${titles[type]}</h4>${data.map(f=>`<div class="fb-item ${classes[type]}">${f}</div>`).join('')}</div>`;
}

// ── HISTORY ───────────────────────────────────────────────
function renderHistChart(){
  const scores=history.slice(0,8).reverse().map(h=>h.score);if(!scores.length)return;
  const max=Math.max(...scores,1);
  const bars=document.getElementById('hcBars');const lbls=document.getElementById('hcLbls');if(!bars)return;
  bars.innerHTML=scores.map(s=>`<div class="hc-bar" style="height:${Math.max(4,s/max*100)}%" title="${s}/100"></div>`).join('');
  lbls.innerHTML=scores.map((_,i)=>`<div class="hc-lbl">S${i+1}</div>`).join('');
}

function renderHistList(){
  const el=document.getElementById('histList');if(!el)return;
  if(!history.length){el.innerHTML='<div style="text-align:center;padding:3rem;color:var(--mt)">No sessions yet. Complete an assessment to see your history!</div>';return;}
  el.innerHTML=history.map(h=>`<div class="hi"><div class="hi-score">${h.score}</div><div class="hi-info"><div class="hi-title">${modes.find(m=>m.id===h.mode)?.title||h.mode}</div><div class="hi-meta">${h.date.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})} · ${h.qs} questions answered</div></div><div style="text-align:right"><div class="hi-bar"><div class="hi-fill" style="width:${h.score}%"></div></div><div style="font-size:.68rem;color:var(--mt);margin-top:.28rem">${h.score}/100</div></div></div>`).join('');
}

// ── LEADERBOARD ───────────────────────────────────────────
function renderLb(){
  document.getElementById('lbList').innerHTML=leaderboard.map((e,i)=>`<div class="lb-row ${e.me?'me':''}"><div class="lb-rank ${i===0?'g':i===1?'s':i===2?'b':''}">${i<3?['🥇','🥈','🥉'][i]:'#'+(i+1)}</div><div class="lb-av">${e.av}</div><div class="lb-info"><div class="lb-name">${e.name}${e.me?' <span style="font-size:.62rem;color:var(--p3);background:rgba(124,110,245,.15);padding:.08rem .38rem;border-radius:4px">YOU</span>':''}</div><div class="lb-bdgs">${e.badges.map(b=>`<span class="lb-b">${b}</span>`).join('')}</div></div><div class="lb-xp">${e.xp.toLocaleString()} XP</div></div>`).join('');
}

function setLb(btn){document.querySelectorAll('.lb-f').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderLb();}

// ── NAV ───────────────────────────────────────────────────
function goTab(tab,btn){
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('on'));btn?.classList.add('on');
  const map={dash:'dashScr',hist:'histScr',lb:'lbScr'};
  showScr(map[tab]||'dashScr');
  if(tab==='hist'){renderHistChart();renderHistList();}
  if(tab==='lb')renderLb();
  if(tab==='dash')renderDash();
}

function showScr(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}
function showXPPop(msg){const el=document.getElementById('xpPop');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400);}
function updateTopBar(){document.getElementById('xpB').textContent='⭐ '+xp.toLocaleString()+' XP';document.getElementById('lvB').textContent='Lv '+level;}

// ── INIT ──────────────────────────────────────────────────
renderDash();
</script>
</body>
</html>
